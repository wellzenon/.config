# Disk usage
#
# The directory defaults to $HOME if the instance is not specified.
# The script may be called with a optional argument to set the alert
# (defaults to 10 for 10%).
[disk]
label=<span color="#50fa7b"></span> 
instance=/
# command=~/.config/i3/scripts/disk | awk 'FNR==2 { gsub(/[A-Za-z]/, ""); printf "%i<span color=\"#50fa7b\">GiB</span>\n", $4 }'
command= df -h / | awk 'FNR==2 { gsub(/[A-Za-z]/, ""); printf "%i<span color=\"#50fa7b\">GiB</span>\n", $4 }'
interval=30
border=#50fa7b
border_top=1
border_right=0
border_bottom=0
border_left=0

# Memory usage
#
# # The type defaults to "mem" if the instance is not specified.
# [memory]
# label= 
# command=~/.config/i3/scripts/memory
# interval=2

[gpu_stats]
command=nvidia-smi --query-gpu=utilization.gpu --format=csv,noheader,nounits | awk '{ printf "%02i<span color=\"#ffb86c\">%</span>", $0}' && nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader,nounits | awk '{ printf " %i<span color=\"#ffb86c\">°C</span>\n", $0}'
label=<span color="#ffb86c"><b>GPU: </b></span>
interval=2
border=#ffb86c
border_top=1
border_right=0
border_bottom=0
border_left=0

[cpu_stats]
# command=sar -u 1 1 | awk 'FNR == 5 { printf "%04.1f<span color=\"#ff5555\">%</span>", (100 - $8) } ' && sensors | awk '{ if ($1 == "CPU" && $2 == "Temperature:") { gsub(/[+°C]/, "") ; printf " %i<span color=\"#ff5555\">°C</span>\n", $3 } }'
command=sh -c 'usage=$(LC_ALL=C sar -u 1 1 | awk '\''/^Average:/ { printf "%.1f<span color=\"#ff5555\">%%</span>", 100 - $8 }'\''); temp=$(LC_ALL=C sensors | awk '\''/Package id 0:/ { gsub(/[+°C]/, "", $4); printf " %.0f<span color=\"#ff5555\">°C</span>", $4; exit } /Core 0:/ { gsub(/[+°C]/, "", $3); printf " %.0f<span color=\"#ff5555\">°C</span>", $3; exit }'\'' ); echo "$usage$temp"'
interval=2
label=<span color="#ff5555"><b>CPU: </b></span>
border=#ff5555
border_top=1
border_right=0
border_bottom=0
border_left=0

[memory]
command=free --giga | awk 'FNR==2{ printf "%i<span color=\"#ff79c6\">GiB</span>\n", $7 }'
interval=2
label=<span color="#ff79c6">  </span>
border=#ff79c6
border_top=1
border_right=0
border_bottom=0
border_left=0

