# i3blocks config file changed for EndeavourOS-i3 setup

# source is available here:
# https://raw.githubusercontent.com/endeavouros-team/endeavouros-i3wm-setup/main/etc/skel/.config/i3/i3blocks.conf
# Maintainer: joekamprad [joekamprad //a_t// endeavouros.com]
# Former Visual Designer: Florent Valetti [@FLVAL EndeavourOS]
# created for i3wm setup on EndeavourOS
# https://endeavouros.com

# cheatsheet for icon fonts used on the block-bar:
# https://fontawesome.com/v4.7/cheatsheet/

# --> to update this run the following command:
# wget --backups=1 https://raw.githubusercontent.com/endeavouros-team/endeavouros-i3wm-setup/main/etc/skel/.config/i3/i3blocks.conf -P ~/.config/i3/

# Please see man i3blocks for a complete reference!
# The man page is also hosted at http://vivien.github.io/i3blocks


# List of valid properties:
#
# align
# color
# command
# full_text
# instance
# interval
# label
# min_width
# name
# separator
# separator_block_width
# short_text
# signal
# urgent

# Global properties
#
# The top properties below are applied to every block, but can be overridden.
align=center
separator=false
color=#f8f8f2
separator_block_width=15
markup=pango

[window_title]
# Escapa barras invertidas e aspas duplas no título da janela antes de cortar
command=~/.config/i3/scripts/window-title
interval=once
signal=1
markup=pango

[mediaplayer]
command= ~/.config/i3/scripts/mediaplayer
interval=5       # Verifica o status a cada 5 segundos
signal=10        # Usa o sinal 10 para atualizações manuais (veja o clique)
border=#bd93f9
border_top=1
border_right=0
border_bottom=0
border_left=0

[volume-mic]
command=~/.config/i3/scripts/volume-mic
instance=Master
interval=1
border=#bd93f9
border_top=1
border_right=0
border_bottom=0
border_left=0

[arch_update]
command=checkupdates | wc -l
interval=once
label=<span color="#1793d1">  </span>
border=#1793d1
border_top=1
border_right=0
border_bottom=0
border_left=0

