# Battery indicator
[battery]
command=~/.config/i3/scripts/battery2
# for alternative battery script  change to battery1
# change this to battery-pinebook-pro if you are running on pinebook-pro
label=
interval=30
color=#ff5555
border=#ff5555
border_top=1
border_right=0
border_bottom=0
border_left=0

# display keyboard layout name
# for keyboard layouts switcher
# see i3 config file
# this needs xkblayout-state installed from the AUR:
# https://aur.archlinux.org/packages/xkblayout-state-git
#[keyboard-layout]
#command=~/.config/i3/scripts/keyboard-layout
#interval=2

[keybindings]
full_text= 
command=~/.config/i3/scripts/keyhint
color=#f1fa8c
border=#f1fa8c
border_top=1
border_right=0
border_bottom=0
border_left=0

# power-profiles-daemon implementation:
# needs package power-profiles-daemon installed and the service running see here:
# https://wiki.archlinux.org/title/CPU_frequency_scaling#power-profiles-daemon

#set power-profile
[ppd_menu]
command=if [ $button ]; then ~/.config/i3/scripts/power-profiles; else ~/.config/i3/scripts/ppd-status | awk '{print substr($0, 1, 2)}' ; fi
interval=5
onclick=~/.config/i3/scripts/power-profiles
color=#407437
border=#407437
border_top=1
border_right=0
border_bottom=0
border_left=0

[time]
command=date '+%H:%M'
interval=1
label=<span color="#8be9fd"> </span>
border=#8be9fd
border_top=1
border_right=0
border_bottom=0
border_left=0

[shutdown_menu]
# full_text= 
command=~/.config/i3/scripts/powermenu
full_text=<span color="#ff5555"> </span>
border=#ff5555
border_top=1
border_right=0
border_bottom=0
border_left=0
